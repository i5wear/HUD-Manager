plugins {
    id 'net.neoforged.moddev' version '2.0.140'
}

neoForge.version = neoforge_version

sourceSets {
    main {
        java.srcDirs += [project(':common').sourceSets.main.java.srcDirs]
        resources.srcDirs += [project(':common').sourceSets.main.resources.srcDirs]
    }
}

processResources {
    filesMatching('**/fabric.mod.json') { expand version: build_version }
    filesMatching('**/neoforge.mods.toml') { expand version: build_version }
}

jar {
    destinationDirectory = rootProject.layout.buildDirectory
    archiveBaseName = rootProject.name
    archiveVersion = build_version
    archiveClassifier = project.name
}